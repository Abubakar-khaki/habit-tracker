<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Habit Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00CFFF">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --neon: #00CFFF;
  --neon-dim: rgba(0,207,255,0.12);
  --neon-glow: rgba(0,207,255,0.3);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-pill: 100px;
  --speed: 0.3s;
  --ease: cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg:       #080C14;
  --bg2:      #0D1520;
  --surface:  #111827;
  --surface2: #1A2333;
  --text:     #E2EEFF;
  --text2:    #7A99BB;
  --text3:    #3D5A7A;
  --border:   rgba(0,207,255,0.1);
  --border2:  rgba(0,207,255,0.28);
  --danger:   #FF5A7A;
}

[data-theme="light"] {
  --bg:       #F0F6FF;
  --bg2:      #E4EFFF;
  --surface:  #FFFFFF;
  --surface2: #EBF4FF;
  --text:     #0A1628;
  --text2:    #4A6A8A;
  --text3:    #96B4CC;
  --border:   rgba(0,120,200,0.13);
  --border2:  rgba(0,120,200,0.35);
  --danger:   #D63358;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  padding: 2rem 1rem 5rem;
  transition: background var(--speed) var(--ease), color var(--speed) var(--ease);
  overflow-x: hidden;
}

/* ambient glow */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(0,207,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: ambientPulse 7s ease-in-out infinite;
}
@keyframes ambientPulse {
  0%,100% { opacity:0.5; transform:translateX(-50%) scale(1); }
  50%      { opacity:1;   transform:translateX(-50%) scale(1.12); }
}

.wrap { max-width: 660px; margin: 0 auto; position: relative; z-index: 1; }

/* ── HEADER ── */
header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 1rem; margin-bottom: 2.5rem;
  animation: fadeDown 0.5s var(--ease) both;
}
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-14px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo-mark { display:flex; align-items:center; gap:12px; }
.logo-icon {
  width:42px; height:42px; border-radius:13px;
  background: var(--neon-dim);
  border: 1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  animation: glowPulse 3.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 0 0 var(--neon-glow); }
  50%      { box-shadow: 0 0 18px 4px var(--neon-glow); }
}

h1 {
  font-size: clamp(1.35rem, 4vw, 1.85rem);
  font-weight: 700;
  letter-spacing: -0.4px;
  line-height: 1.15;
  background: linear-gradient(130deg, var(--text) 40%, var(--neon) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { font-size: 0.8rem; color: var(--text2); margin-top: 3px; }

.header-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }

.date-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--neon);
  background: var(--neon-dim);
  border: 1px solid var(--border2);
  padding: 5px 13px;
  border-radius: var(--radius-pill);
  white-space: nowrap;
  letter-spacing: 0.3px;
}

#theme-toggle {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  cursor: pointer;
  display:flex; align-items:center; gap:5px;
  padding: 6px 13px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.73rem; color: var(--text2);
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
#theme-toggle:hover { border-color: var(--border2); color: var(--text); }

/* ── STATS ── */
.stats-row {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
  margin-bottom:1.6rem;
  animation: fadeUp 0.5s 0.08s var(--ease) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  position:relative; overflow:hidden;
  transition: border-color 0.25s, transform 0.2s var(--ease);
  cursor: default;
}
.stat-card::after {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--neon), transparent);
  opacity:0; transition: opacity 0.3s;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-3px); }
.stat-card:hover::after { opacity:1; }

.stat-label {
  font-size:0.67rem; color:var(--text3);
  text-transform:uppercase; letter-spacing:1px;
  font-weight:600; margin-bottom:5px;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size:1.65rem; font-weight:500;
  color: var(--neon); line-height:1;
}
.stat-sub { font-size:0.67rem; color:var(--text2); margin-top:3px; }

/* ── PROGRESS ── */
.progress-wrap {
  margin-bottom:1.8rem;
  animation: fadeUp 0.5s 0.14s var(--ease) both;
}
.progress-meta {
  display:flex; justify-content:space-between;
  font-size:0.74rem; color:var(--text2); margin-bottom:8px;
}
.progress-meta span:last-child {
  font-family:'JetBrains Mono',monospace; color:var(--neon); font-size:0.72rem;
}
.progress-track {
  height:6px; background:var(--surface2);
  border-radius:var(--radius-pill); overflow:hidden;
}
#progress-bar {
  height:100%; border-radius:var(--radius-pill);
  background: linear-gradient(90deg, #007BB5, var(--neon));
  transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
#progress-bar::after {
  content:''; position:absolute; right:0; top:0; bottom:0; width:24px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5));
  animation: barShimmer 1.8s ease-in-out infinite;
}
@keyframes barShimmer { 0%,100%{opacity:0} 50%{opacity:1} }

/* ── CELEBRATION ── */
#celebration {
  display:none; margin-bottom:1.2rem;
  background: var(--neon-dim);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding:11px 18px;
  font-size:0.84rem; color:var(--neon); font-weight:500;
  text-align:center;
  animation: celebPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes celebPop {
  from { opacity:0; transform:scale(0.88); }
  to   { opacity:1; transform:scale(1); }
}

/* ── ADD ── */
.add-section {
  display:flex; gap:8px; margin-bottom:1.6rem;
  animation: fadeUp 0.5s 0.2s var(--ease) both;
}
#habit-input {
  flex:1; padding:13px 16px;
  font-size:0.91rem; font-family:'Space Grotesk',sans-serif;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  outline:none;
  transition: border-color 0.25s, box-shadow 0.25s, background 0.3s;
}
#habit-input:focus {
  border-color: var(--neon);
  box-shadow: 0 0 0 3px var(--neon-dim);
}
#habit-input::placeholder { color:var(--text3); }

#add-btn {
  padding:13px 22px;
  background: var(--neon); color:#050D18;
  border:none; border-radius: var(--radius-sm);
  font-family:'Space Grotesk',sans-serif; font-weight:700;
  font-size:0.88rem; cursor:pointer;
  transition: transform 0.15s var(--ease), box-shadow 0.2s;
  white-space:nowrap; position:relative; overflow:hidden;
}
#add-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.25),transparent);
  opacity:0; transition:opacity 0.2s;
}
#add-btn:hover { box-shadow:0 0 22px var(--neon-glow); transform:translateY(-1px); }
#add-btn:hover::before { opacity:1; }
#add-btn:active { transform:scale(0.97) translateY(0); box-shadow:none; }

/* ── SECTION LABEL ── */
.section-label {
  font-size:0.68rem; color:var(--text3);
  text-transform:uppercase; letter-spacing:1.3px; font-weight:600;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:0.8rem;
  animation: fadeUp 0.5s 0.24s var(--ease) both;
}
#complete-all-btn {
  font-size:0.72rem; font-family:'Space Grotesk',sans-serif; font-weight:500;
  color:var(--neon); background:none; border:none; cursor:pointer;
  text-transform:none; letter-spacing:0; padding:0;
  transition: opacity 0.2s;
}
#complete-all-btn:hover { opacity:0.65; }

/* ── HABIT LIST ── */
#habit-list { display:flex; flex-direction:column; gap:8px; }

.habit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; position:relative; overflow:hidden;
  transition:
    border-color 0.25s var(--ease),
    background 0.25s var(--ease),
    transform 0.2s var(--ease),
    box-shadow 0.25s var(--ease);
  animation: cardIn 0.32s var(--ease) both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateX(-10px); }
  to   { opacity:1; transform:translateX(0); }
}
.habit-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--border); border-radius:3px 0 0 3px;
  transition: background 0.25s var(--ease), box-shadow 0.25s;
}
.habit-card:hover { border-color:var(--border2); transform:translateX(4px); box-shadow:-3px 0 18px var(--neon-dim); }
.habit-card.done { border-color:rgba(0,207,255,0.28); background:var(--surface2); }
.habit-card.done::before { background:var(--neon); box-shadow:0 0 9px var(--neon-glow); }

/* ripple */
.ripple {
  position:absolute; border-radius:50%;
  background:rgba(0,207,255,0.14);
  transform:scale(0);
  animation: rippleAnim 0.55s var(--ease) forwards;
  pointer-events:none;
}
@keyframes rippleAnim { to { transform:scale(4); opacity:0; } }

/* checkbox */
.habit-check {
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--text3);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
}
.habit-card.done .habit-check {
  background:var(--neon); border-color:var(--neon);
  box-shadow:0 0 10px var(--neon-glow);
}
.habit-check svg { display:none; }
.habit-card.done .habit-check svg {
  display:block;
  animation:checkPop 0.3s cubic-bezier(0.175,0.885,0.32,1.5) both;
}
@keyframes checkPop {
  from { transform:scale(0) rotate(-20deg); }
  to   { transform:scale(1) rotate(0); }
}

.habit-info { flex:1; min-width:0; }
.habit-name {
  font-weight:500; font-size:0.94rem; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:color 0.2s;
}
.habit-card.done .habit-name { text-decoration:line-through; color:var(--text2); }
.habit-streak {
  font-size:0.7rem; color:var(--text3); margin-top:3px;
  font-family:'JetBrains Mono',monospace;
}
.habit-streak .fire { color:var(--neon); }

.delete-btn {
  background:none; border:none; cursor:pointer; color:var(--text3);
  padding:5px; border-radius:8px;
  display:flex; align-items:center;
  transition:color 0.2s, background 0.2s, transform 0.2s;
  flex-shrink:0; opacity:0;
  transition: opacity 0.2s, color 0.2s, transform 0.2s, background 0.2s;
}
.habit-card:hover .delete-btn { opacity:1; }
.delete-btn:hover { color:var(--danger); background:rgba(255,90,122,0.1); transform:scale(1.12); }

/* ── EMPTY ── */
#empty-state {
  display:none; flex-direction:column; align-items:center;
  text-align:center; padding:3rem 1rem;
  background: var(--surface);
  border:1px dashed var(--border);
  border-radius:var(--radius); color:var(--text2);
  animation: fadeUp 0.4s var(--ease) both;
}
.es-icon {
  font-size:2.2rem; margin-bottom:0.7rem;
  animation:floatIcon 3.5s ease-in-out infinite;
}
@keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
#empty-state p { font-size:0.87rem; }

@media (max-width:480px) {
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .stat-card:last-child { display:none; }
  .delete-btn { opacity:1; }
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo-mark">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="9" stroke="#00CFFF" stroke-width="1.5"/>
        <path d="M7 11L10 14L15 8" stroke="#00CFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <h1>Habit Tracker</h1>
      <p class="subtitle">Build streaks, one day at a time.</p>
    </div>
  </div>
  <div class="header-right">
    <button id="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">Light</span>
    </button>
    <div class="date-chip" id="today-badge">—</div>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Today</div>
    <div class="stat-value" id="stat-today">0/0</div>
    <div class="stat-sub">completed</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Best Streak</div>
    <div class="stat-value" id="stat-streak">0</div>
    <div class="stat-sub">days in a row</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Habits</div>
    <div class="stat-value" id="stat-habits">0</div>
    <div class="stat-sub">total tracked</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span>Today's progress</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-track">
    <div id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div id="celebration">⚡ All habits done for today — incredible work!</div>

<div class="add-section">
  <input id="habit-input" type="text" placeholder="New habit… e.g. Read 20 pages" maxlength="60" />
  <button id="add-btn" onclick="addHabit()">+ Add</button>
</div>

<div class="section-label">
  <span>Today's Habits</span>
  <button id="complete-all-btn" onclick="completeAll()" style="display:none">Mark all done</button>
</div>

<div id="empty-state">
  <div class="es-icon">💡</div>
  <p>No habits yet — add your first one above!</p>
</div>

<ul id="habit-list" style="list-style:none;padding:0;margin:0;"></ul>

</div>

<script>
const KEY_HABITS   = 'ht_habits_v2';
const KEY_PROGRESS = 'ht_progress_v2';
const KEY_THEME    = 'ht_theme';
let habits = [], progress = {};

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function load() {
  try { habits   = JSON.parse(localStorage.getItem(KEY_HABITS))   || []; } catch(e){ habits=[]; }
  try { progress = JSON.parse(localStorage.getItem(KEY_PROGRESS)) || {}; } catch(e){ progress={}; }
}
function save() {
  localStorage.setItem(KEY_HABITS,   JSON.stringify(habits));
  localStorage.setItem(KEY_PROGRESS, JSON.stringify(progress));
}

function addHabit() {
  const inp = document.getElementById('habit-input');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const habit = { id: Date.now().toString(), name, createdAt: todayKey() };
  habits.push(habit);
  const tk = todayKey();
  if (!progress[tk]) progress[tk] = {};
  progress[tk][habit.id] = false;
  save(); inp.value = ''; inp.focus(); render();
}

function toggleHabit(id, evt) {
  const tk = todayKey();
  if (!progress[tk]) progress[tk] = {};
  progress[tk][id] = !progress[tk][id];
  save();
  if (evt) {
    const card = evt.currentTarget;
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = card.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${evt.clientX-rect.left-size/2}px;top:${evt.clientY-rect.top-size/2}px`;
    card.appendChild(r);
    setTimeout(() => r.remove(), 600);
  }
  render();
}

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  Object.keys(progress).forEach(d => { delete progress[d][id]; });
  save(); render();
}

function completeAll() {
  const tk = todayKey();
  if (!progress[tk]) progress[tk] = {};
  habits.forEach(h => { progress[tk][h.id] = true; });
  save(); render();
}

function calcStreak(id) {
  let s = 0, d = new Date();
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (progress[k] && progress[k][id]) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}

function calcBestStreak() {
  const days = Object.keys(progress).sort();
  let best=0, cur=0, prev=null;
  days.forEach(day => {
    const dh = habits.filter(h => h.createdAt <= day);
    if (!dh.length) return;
    if (dh.every(h => progress[day][h.id])) {
      if (prev) { const diff=(new Date(day)-new Date(prev))/86400000; cur=diff===1?cur+1:1; }
      else cur=1;
      best=Math.max(best,cur);
    } else cur=0;
    prev=day;
  });
  return best;
}

function animNum(id, val) {
  const el = document.getElementById(id);
  const v = String(val);
  if (el.textContent === v) return;
  el.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
  el.style.transform = 'translateY(-5px)'; el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = v; el.style.transform = 'translateY(5px)';
    setTimeout(() => { el.style.transform = 'translateY(0)'; el.style.opacity = '1'; }, 10);
  }, 170);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const tk = todayKey();
  if (!progress[tk]) progress[tk] = {};
  habits.forEach(h => { if (progress[tk][h.id]===undefined) progress[tk][h.id]=false; });

  const total = habits.length;
  const done  = habits.filter(h => progress[tk][h.id]).length;
  const pct   = total ? Math.round((done/total)*100) : 0;

  document.getElementById('today-badge').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  animNum('stat-today',  `${done}/${total}`);
  animNum('stat-streak', calcBestStreak());
  animNum('stat-habits', total);

  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-pct').textContent  = pct+'%';

  const cel = document.getElementById('celebration');
  cel.style.display = (total>0 && done===total) ? 'block' : 'none';

  const empty = document.getElementById('empty-state');
  empty.style.display = total===0 ? 'flex' : 'none';
  document.getElementById('complete-all-btn').style.display = total===0 ? 'none' : 'inline';

  const list = document.getElementById('habit-list');
  list.innerHTML = '';
  habits.forEach((h, i) => {
    const isDone = !!progress[tk][h.id];
    const streak = calcStreak(h.id);
    const li = document.createElement('li');
    const card = document.createElement('div');
    card.className = `habit-card${isDone?' done':''}`;
    card.style.animationDelay = `${i*0.045}s`;
    card.innerHTML = `
      <div class="habit-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 3.5L3.5 6.5L9 1" stroke="#050D18" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="habit-info">
        <div class="habit-name">${escHtml(h.name)}</div>
        <div class="habit-streak">${streak>0?`<span class="fire">⚡ ${streak}d streak</span>`:'— start today'}</div>
      </div>
      <button class="delete-btn" title="Remove">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
      </button>`;
    card.querySelector('.delete-btn').addEventListener('click', e => { e.stopPropagation(); deleteHabit(h.id); });
    card.addEventListener('click', e => { if (!e.target.closest('.delete-btn')) toggleHabit(h.id, e); });
    li.appendChild(card);
    list.appendChild(li);
  });
}

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  document.getElementById('theme-icon').textContent  = dark?'☀️':'🌙';
  document.getElementById('theme-label').textContent = dark?'Light':'Dark';
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  localStorage.setItem(KEY_THEME, isDark?'light':'dark');
  applyTheme(!isDark);
}

document.getElementById('habit-input').addEventListener('keydown', e => { if(e.key==='Enter') addHabit(); });

load();
applyTheme((localStorage.getItem(KEY_THEME)||'dark')==='dark');
render();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("SW Registered"));
}
</script>
